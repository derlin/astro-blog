name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Tell Astro where it is deployed
  SITE: ${{ vars.ASTRO_SITE }}
  BASE: ${{ vars.ASTRO_BASE_PATH || '' }}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check Environment
        run: |
          echo "SITE: $SITE"
          echo "BASE: $BASE"
          [ "$SITE" ] || { echo "Error: SITE environment variable is required"; exit 1; }
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install, Build, and Upload
        uses: withastro/action@v6
        with:
          node-version: 24
          build-cmd: npm run format:check && npm run build
      - name: Summary
        run: echo "Site built successfully 🚀 (SITE=$SITE, BASE='$BASE')" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
